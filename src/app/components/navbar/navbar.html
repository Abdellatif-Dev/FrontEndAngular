<nav
  class="fixed top-0 left-0 right-0 z-50 bg-gray-900/60 backdrop-blur-md text-white shadow-lg border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex justify-between items-center h-16">

      <div class="flex items-center space-x-8">
        <a routerLink="/" class="flex items-center space-x-2">
          <img src="LOGO.png" alt="logo" class="w-14 h-14">
        </a>

        <div class="hidden md:flex space-x-6">
          <a routerLink="/" 
             routerLinkActive="text-yellow-400" 
             [routerLinkActiveOptions]="{exact: true}"
             class="hover:text-yellow-400 transition duration-300">
            Magasin
          </a>

          <a *ngIf="auth.isLoggedIn()" 
             [routerLink]="auth.isAdmin() ? '/admin' : '/user'"
             routerLinkActive="text-yellow-400"
             class="hover:text-yellow-400 transition duration-300">
            Dashboard
          </a>
        </div>
      </div>

      <div class="flex items-center space-x-4">
        
        <ng-container *ngIf="!auth.isLoggedIn()">
          <button routerLink="/register"
            class="bg-yellow-400 text-gray-900 px-5 py-2 rounded-lg font-bold hover:bg-yellow-500 transition duration-300 shadow-md text-sm">
            S'inscrire
          </button>
        </ng-container>

        <ng-container *ngIf="auth.isLoggedIn()">
          <div class="flex items-center space-x-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10">
            
            <div class="w-8 h-8 rounded-full bg-yellow-400 text-gray-900 flex items-center justify-center font-bold text-sm uppercase shadow-inner">
              {{ auth.username().charAt(0) }}
            </div>

            <span class="text-sm font-medium hidden sm:block">{{ auth.username() }}</span>

            <button (click)="auth.logout()" 
                    class="text-xs bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white px-3 py-1 rounded-full transition-all duration-300 border border-red-500/30">
              Quitter
            </button>
          </div>
        </ng-container>

      </div>

    </div>
  </div>
</nav>
