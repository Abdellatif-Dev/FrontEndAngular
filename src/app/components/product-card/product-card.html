<div class="bg-slate-800/40 backdrop-blur-md border border-slate-700/50 rounded-2xl overflow-hidden flex flex-col transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-amber-500/10 group"
     [class.opacity-60]="product.stock === 0">

  <div class="relative aspect-[4/3] overflow-hidden bg-slate-900">
    <ng-container *ngIf="product.imageUrl; else placeholder">
      <img [src]="'http://localhost:8082' + product.imageUrl" 
           [alt]="product.name" 
           class="w-full h-full object-cover transition-transform duration-500 ease-in-out group-hover:scale-110" 
           loading="lazy">
    </ng-container>
    
    <ng-template #placeholder>
      <div class="w-full h-full flex items-center justify-center text-slate-700">
        <span class="material-icons text-5xl">inventory_2</span>
      </div>
    </ng-template>

    <span *ngIf="product.category"
          class="absolute top-3 left-3 bg-slate-900/80 backdrop-blur-md text-amber-500 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider border border-white/5">
      {{ product.category }}
    </span>

    <div *ngIf="product.stock === 0"
         class="absolute inset-0 bg-slate-950/80 flex items-center justify-center text-white font-bold text-xs uppercase tracking-widest backdrop-blur-[2px]">
      <span class="border border-white/20 px-4 py-2 rounded-lg">Rupture de stock</span>
    </div>
  </div>

  <div class="p-5 flex flex-col gap-3 flex-1">
    
    <div class="font-bold text-white text-base group-hover:text-amber-400 transition-colors duration-300">
      {{ product.name }}
    </div>

    <div *ngIf="product.description" class="text-slate-400 text-xs leading-relaxed line-clamp-2">
      {{ product.description }}
    </div>

    <div class="flex justify-between items-end mt-2">
      <div class="flex flex-col">
        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-tighter">Prix</span>
        <div class="font-black text-xl text-amber-500">
          {{ product.price | number:'1.2-2' }} <span class="text-sm">DH</span>
        </div>
      </div>

      <div class="text-[11px] font-medium">
        <ng-container *ngIf="product.stock > 5">
          <div class="flex items-center gap-1 text-emerald-400 bg-emerald-400/10 px-2 py-1 rounded-md">
            <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
            En stock
          </div>
        </ng-container>
        
        <ng-container *ngIf="product.stock > 0 && product.stock <= 5">
          <div class="flex items-center gap-1 text-amber-400 bg-amber-400/10 px-2 py-1 rounded-md">
            <span class="material-icons text-[14px]">warning</span>
            Plus que {{ product.stock }}
          </div>
        </ng-container>
      </div>
    </div>

    <button 
      class="mt-3 w-full bg-amber-500 hover:bg-amber-600 disabled:bg-slate-700 disabled:text-slate-500 text-slate-950 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 active:scale-95 shadow-lg shadow-amber-500/10"
      [disabled]="product.stock === 0"
      (click)="addToCart.emit(product)">
      <span class="text-sm">Ajouter au panier</span>
    </button>

  </div>
</div>
