<div class="min-h-screen flex items-center justify-center bg-[#0f172a] px-4 py-12">

  <div class="w-full max-w-md bg-slate-800/40 backdrop-blur-md border border-slate-700 rounded-2xl shadow-2xl p-8">

    <div class="flex justify-center gap-2 font-bold text-xl mb-6">
      <img src="LOGO.png" alt="logo" class="w-20 h-20">
    </div>

    <h1 class="text-2xl font-extrabold mb-2 text-white">Créer un compte</h1>
    <p class="text-slate-400 text-sm mb-4">Rejoignez des milliers d'utilisateurs</p>

    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-lg text-xs mb-6
                bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
      <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
      Inscription en tant que <strong>Client</strong>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Nom d'utilisateur</label>
        <input type="text" formControlName="username" placeholder="ex: jean_dupont"
          class="w-full px-4 py-2.5 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-white transition-all"
          [ngClass]="{'border-red-500': isInvalid('username')}">

        <p *ngIf="isInvalid('username')" class="text-red-400 text-xs mt-1">
          {{ getError('username') }}
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Adresse E-mail</label>
        <input type="email" formControlName="email" placeholder="exemple@mail.com"
          class="w-full px-4 py-2.5 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-white transition-all"
          [ngClass]="{'border-red-500': isInvalid('email')}">

        <p *ngIf="isInvalid('email')" class="text-red-400 text-xs mt-1">
          {{ getError('email') }}
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Mot de passe</label>

        <div class="relative">
          <input [type]="showPass() ? 'text' : 'password'" formControlName="password" placeholder="Min. 6 caractères"
            class="w-full px-4 py-2.5 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-white transition-all"
            [ngClass]="{'border-red-500': isInvalid('password')}">

          <button type="button" (click)="togglePass()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white text-xs font-medium transition-colors">
            {{ showPass() ? 'Masquer' : 'Afficher' }}
          </button>
        </div>

        <div class="h-1 bg-slate-700 rounded-full mt-2 overflow-hidden">
          <div class="h-full transition-all duration-500" [style.width]="strengthWidth()" [ngClass]="{
              'bg-red-500': strengthClass() === 'weak',
              'bg-amber-500': strengthClass() === 'fair',
              'bg-emerald-500': strengthClass() === 'strong'
            }">
          </div>
        </div>

        <p *ngIf="isInvalid('password')" class="text-red-400 text-xs mt-1">
          {{ getError('password') }}
        </p>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1 text-slate-300">Confirmer le mot de passe</label>
        <input type="password" formControlName="confirmPassword" placeholder="Répétez le mot de passe"
          class="w-full px-4 py-2.5 bg-slate-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-amber-500 focus:border-amber-500 outline-none text-white transition-all"
          [ngClass]="{'border-red-500': isInvalid('confirmPassword') || passwordMismatch()}">

        <p *ngIf="passwordMismatch()" class="text-red-400 text-xs mt-1">
          Les mots de passe ne correspondent pas
        </p>
      </div>

      <div *ngIf="apiError()" class="bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-3 rounded-lg">
        {{ apiError() }}
      </div>

      <button type="submit" [disabled]="loading()"
        class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 py-3 rounded-xl font-bold transition-all transform active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-amber-500/20">

        <span *ngIf="loading()" class="flex items-center justify-center gap-2">
          <svg class="animate-spin h-5 w-5 text-slate-950" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none">
            </circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          Création...
        </span>
        <span *ngIf="!loading()">Créer le compte</span>
      </button>

    </form>

    <p class="text-center text-sm text-slate-400 mt-8">
      Vous avez déjà un compte ?
      <a routerLink="/login" class="text-amber-500 font-bold hover:text-amber-400 hover:underline transition-all">
        Se connecter
      </a>
    </p>

  </div>
</div>
